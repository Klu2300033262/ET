<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Hexagon -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Connected Nodes (Knowledge Graph structure) -->
  <circle cx="50" cy="30" r="8" fill="url(#grad)" />
  <circle cx="30" cy="60" r="8" fill="url(#grad)" />
  <circle cx="70" cy="60" r="8" fill="url(#grad)" />
  
  <!-- Connection Lines -->
  <line x1="50" y1="30" x2="30" y2="60" stroke="#f1f5f9" stroke-width="3" stroke-dasharray="2,2" />
  <line x1="50" y1="30" x2="70" y2="60" stroke="#f1f5f9" stroke-width="3" stroke-dasharray="2,2" />
  <line x1="30" y1="60" x2="70" y2="60" stroke="#f1f5f9" stroke-width="3" stroke-dasharray="2,2" />
  
  <!-- Inner core detail -->
  <circle cx="50" cy="50" r="4" fill="#ffffff" />
</svg>